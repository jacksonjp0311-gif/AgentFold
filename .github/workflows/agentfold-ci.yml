name: AgentFold CI

on:
  pull_request:
  push:

jobs:
  agentfold-local-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: python -m pytest -q
      - run: python -m agentfold.cli validate-genome examples/genomes/minimal_agent_genome.json
